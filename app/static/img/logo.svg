<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- GhostPortal Logo — hexagonal ghost/portal icon -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon -->
  <path
    d="M24 3L43.05 13.5V34.5L24 45L4.95 34.5V13.5L24 3Z"
    stroke="#00ff88"
    stroke-width="1.5"
    fill="rgba(0, 255, 136, 0.05)"
    filter="url(#glow)"
  />

  <!-- Inner ring -->
  <circle cx="24" cy="24" r="12" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.6"/>

  <!-- Portal/target center -->
  <circle cx="24" cy="24" r="5" fill="#00ff88" opacity="0.9" filter="url(#glow)"/>
  <circle cx="24" cy="24" r="3" fill="#0a0e1a"/>
  <circle cx="24" cy="24" r="1.5" fill="#00ff88" opacity="0.8"/>

  <!-- Corner accent marks -->
  <line x1="24" y1="9" x2="24" y2="13" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
  <line x1="24" y1="35" x2="24" y2="39" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
  <line x1="10" y1="17" x2="13.5" y2="19" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
  <line x1="38" y1="17" x2="34.5" y2="19" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
  <line x1="10" y1="31" x2="13.5" y2="29" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
  <line x1="38" y1="31" x2="34.5" y2="29" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
</svg>
