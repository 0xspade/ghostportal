<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>429 — Too Many Requests</title>
  <link href="{{ url_for('static', filename='hud/css/vendor.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='hud/css/app.min.css') }}" rel="stylesheet">
</head>
<body>
<div id="app" class="app app-full-height app-without-header">
  <div class="error-page">
    <div class="error-page-content text-center">
      <div class="error-code text-theme">429</div>
      <h2 class="fw-bold mb-2">TOO MANY REQUESTS</h2>
      <p class="text-inverse text-opacity-50 mb-2">Too many requests. Please wait before trying again.</p>
      <p class="text-warning mb-4">
        Retry in <span id="retry-secs" class="fw-bold">60</span>s
      </p>
      <button class="btn btn-theme" id="retry-btn" disabled onclick="location.reload()">
        <i class="bi bi-arrow-clockwise me-2"></i>Retry
      </button>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='hud/js/vendor.min.js') }}"></script>
<script src="{{ url_for('static', filename='hud/js/app.min.js') }}"></script>
<script>
(function(){
  var s = 60;
  var el = document.getElementById('retry-secs');
  var btn = document.getElementById('retry-btn');
  var t = setInterval(function(){
    s--;
    el.textContent = s;
    if (s <= 0) {
      clearInterval(t);
      btn.removeAttribute('disabled');
    }
  }, 1000);
})();
</script>
</body>
</html>
