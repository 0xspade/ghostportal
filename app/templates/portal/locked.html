<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Access Suspended — {{ config.PLATFORM_NAME | default('GhostPortal') }}</title>
  <link href="{{ url_for('static', filename='hud/css/vendor.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='hud/css/app.min.css') }}" rel="stylesheet">
</head>
<body>
<div id="app" class="app app-full-height app-without-header">
  <div class="error-page">
    <div class="error-page-content text-center">
      <div class="text-warning mb-3" style="font-size:4rem;">
        <i class="bi bi-lock"></i>
      </div>
      <h2 class="fw-bold mb-2">ACCESS SUSPENDED</h2>
      <p class="text-inverse text-opacity-50 mb-3">
        Your access to this portal has been temporarily suspended.
      </p>
      {% if lock_reason %}
      <div class="alert alert-warning d-inline-block text-start mb-3" style="max-width:400px;">
        <i class="bi bi-info-circle me-2"></i><strong>Reason:</strong> {{ lock_reason }}
      </div>
      {% endif %}
      <p class="text-inverse text-opacity-50 small">
        If you believe this is an error, contact the researcher directly.<br>
        Do not attempt to bypass this restriction.
      </p>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='hud/js/vendor.min.js') }}"></script>
<script src="{{ url_for('static', filename='hud/js/app.min.js') }}"></script>
</body>
</html>
