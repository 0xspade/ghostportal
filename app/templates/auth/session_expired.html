<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Session Expired — {{ config.PLATFORM_NAME | default('GhostPortal') }}</title>
  <link href="{{ url_for('static', filename='hud/css/vendor.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='hud/css/app.min.css') }}" rel="stylesheet">
</head>
<body>
<div id="app" class="app app-full-height app-without-header">
  <div class="error-page">
    <div class="error-page-content text-center">
      <div class="mb-3 text-warning" style="font-size:4rem;">
        <i class="bi bi-clock-history"></i>
      </div>
      <h2 class="fw-bold mb-2">SESSION EXPIRED</h2>
      {% if reason == 'displaced' %}
      <p class="text-inverse text-opacity-50 mb-4">
        Your session was ended because you signed in from another location.
      </p>
      {% elif reason == 'idle' %}
      <p class="text-inverse text-opacity-50 mb-4">
        Your session expired due to inactivity.
      </p>
      {% else %}
      <p class="text-inverse text-opacity-50 mb-4">
        Your session has expired. Please log in again.
      </p>
      {% endif %}
      <a href="{{ url_for('auth.login') }}" class="btn btn-theme">
        <i class="bi bi-box-arrow-in-right me-1"></i>Log In Again
      </a>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='hud/js/vendor.min.js') }}"></script>
<script src="{{ url_for('static', filename='hud/js/app.min.js') }}"></script>
</body>
</html>
