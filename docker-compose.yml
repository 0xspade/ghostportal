services:

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ghostportal
      POSTGRES_USER: nduser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nduser -d ghostportal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nduser:${POSTGRES_PASSWORD}@db:5432/ghostportal
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal
      - proxy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    command: celery -A celery_worker.celery worker --concurrency=4 --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nduser:${POSTGRES_PASSWORD}@db:5432/ghostportal
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    networks:
      - internal
      - proxy

  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    command: celery -A celery_worker.celery beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nduser:${POSTGRES_PASSWORD}@db:5432/ghostportal
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    networks:
      - internal
      - proxy

volumes:
  pgdata:
  redisdata:
  uploads:
  logs:

networks:
  internal:
    driver: bridge
    internal: true   # db + redis: no external access
  proxy:
    driver: bridge   # app port reachable by host nginx
